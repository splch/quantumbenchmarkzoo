name: Discover benchmarks

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: Lookback window in days
        required: false
        default: '10'

permissions:
  contents: write
  issues: write

concurrency:
  group: discover
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Harvest and triage new benchmark candidates
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DAYS: ${{ github.event.inputs.days || '10' }}
        run: node scripts/discover.mjs --days "$DAYS" --report discovery-report.md
      - name: Open an issue with the shortlist
        if: hashFiles('discovery-report.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create benchmark-discovery --force --color 1D76DB \
            --description "Automated benchmark discovery shortlist"
          gh issue create \
            --title "Benchmark discovery: $(date -u +%Y-%m-%d)" \
            --body-file discovery-report.md \
            --label benchmark-discovery
      - name: Record triaged candidates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/discovery/seen.json
          if ! git diff --cached --quiet; then
            git commit -m "Record triaged benchmark discovery candidates"
            git push
          fi
